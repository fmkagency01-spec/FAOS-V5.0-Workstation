# Render Blueprint — auto-detected from GitHub repo root (no dashboard shell needed).
services:
  - type: web
    name: faos-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ALLOW_ALL
        value: "true"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAC_CENTRAL_CORE_URL
        sync: false
